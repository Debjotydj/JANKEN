<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANKEN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameBody">
        <h1 id="heading">ROCK-PAPER-SESIOR-CUT</h1>
        <div id="buttongroup">
            <button class="buttons" id="rock">Rock</button>
            <button class="buttons" id="paper">Paper</button>
            <button class="buttons" id="sesior">Scissor</button>
        </div>
        <br>
        <div id="scoreButtonGroup">
            <button class="scoreButtons" id="winb">WIN : </button>
            <button class="scoreButtons" id="tieb">TIE : </button>
            <button class="scoreButtons" id="lostb">LOST : </button>
            <button class="scoreButtons" id="totalb">TOTAL : </button>
        </div>
        <input type="text" id="display">
        <h3 id="result">RESULT</h3>
        <br>
        <div id="resetdiv">
            <button id="resetValue">RESET</button>
        </div>
    </div>
    <script src="source.js"></script>
</body>
</html>
